name: Manual Deploy to Client Server

on:
  workflow_dispatch:  # 手动触发配置
    inputs:
      branch:
        description: '需要部署的分支'
        required: true
        default: 'main'

jobs:
  deploy-client:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to client server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.180.137.15
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /www/wwwroot/account-backend.2025fc.xyz/account-bot-backend &&
            git pull --rebase origin ${{ github.event.inputs.branch }}  # 动态读取分支
            npm install
            git checkout -f .
            npm run build
            npm run copy-to-remote